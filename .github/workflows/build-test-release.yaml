---
# SPDX-License-Identifier: Apache-2.0
# SPDX-FileCopyrightText: 2026 The Linux Foundation

# Reusable Go build/test/release pipeline (Model A: tag-driven).
#
# Reproduces the canonical Linux Foundation release pipeline shape. The
# repository-metadata job runs in parallel as an informational step.
# The release-matrix job expands release_goos/release_goarch into a
# GOOS×GOARCH build matrix. After build the audit jobs in { } run in
# parallel; the tests then gate on them (gating inversion: on releases
# the audits gate the expensive test suite), while checksums, signing
# and attestation run alongside; publishing runs at the end:
#   tag-validate -> release-matrix -> build
#     -> { audit | sbom -> grype } -> tests
#     -> checksums -> sign-artefacts
#     -> attest
#     -> attach-artefacts -> promote-release
#
# Go module consumers fetch releases through the module proxy straight
# from the tag, so this workflow attaches binary artefacts, checksums,
# a Sigstore signature bundle and SBOM files to the GitHub release.
# Projects without a buildable main package get a compile check and a
# release without binary artefacts.
#
# Call this from a thin caller workflow on a tag push; see
# examples/build-test-release/ for both a plain GitHub-native caller and
# a Gerrit-sourced caller.
name: '[R] Go Build/Test/Release'

# yamllint disable-line rule:truthy
on:
  workflow_call:
    inputs:
      # --- Checkout target (defaults to the calling repository) ---
      repository:
        description: 'Repository to check out (owner/name)'
        required: false
        type: string
        default: ''
      ref:
        description: >-
          Branch/tag/SHA to check out. Empty uses the triggering
          event's ref for same-repository checkouts, or the default
          branch when checking out a different repository.
        required: false
        type: string
        default: ''

      # --- Project layout ---
      path_prefix:
        description: 'Path to the project root directory'
        required: false
        type: string
        default: '.'

      # --- Go toolchain ---
      go_version:
        description: >-
          Explicit Go version for release builds. Empty derives the
          version from go.mod.
        required: false
        type: string
        default: ''

      # --- Build ---
      release_goos:
        description: 'Comma-separated GOOS values for release binaries'
        required: false
        type: string
        default: 'linux,darwin,windows'
      release_goarch:
        description: 'Comma-separated GOARCH values for release binaries'
        required: false
        type: string
        default: 'amd64,arm64'
      build_target:
        description: >-
          Package to build for release binaries. The default probes the
          module root and cmd/ for a main package.
        required: false
        type: string
        default: './...'
      output_name:
        description: >-
          Base name for release binaries; full artefact names follow
          <name>-<tag>-<goos>-<goarch>[.exe]. Empty uses the repository
          name. Projects without a main package get a compile check and
          no binary artefacts.
        required: false
        type: string
        default: ''
      build_flags:
        description: 'Extra flags passed to go build (after -trimpath)'
        required: false
        type: string
        default: ''

      # --- Tests ---
      test_args:
        description: 'Extra arguments passed to go test'
        required: false
        type: string
        default: ''
      coverage:
        description: 'Collect and report test coverage'
        required: false
        type: boolean
        default: true
      race:
        description: 'Run tests with the Go race detector'
        required: false
        type: boolean
        default: true
      test_permit_fail:
        description: 'Permit test failures without failing the workflow'
        required: false
        type: boolean
        default: false

      # --- Audit ---
      gosec:
        description: 'Run the gosec security scanner during the audit'
        required: false
        type: boolean
        default: false
      staticcheck:
        description: 'Run staticcheck during the audit'
        required: false
        type: boolean
        default: false
      audit_permit_fail:
        description: 'Permit dependency audit failures (the NO_BLOCK pattern)'
        required: false
        type: boolean
        default: false

      # --- Grype scan ---
      grype_fail_on:
        description: 'Minimum severity that fails the Grype scan'
        required: false
        type: string
        default: 'medium'
      grype_permit_fail:
        description: >-
          Permit Grype findings without failing the job. When false, falls
          back to the NO_BLOCK_AUDIT_FAIL repository variable at runtime.
        required: false
        type: boolean
        default: false

      # --- Runner hardening ---
      harden_runner_egress:
        description: "Harden-runner egress policy: 'block' or 'audit'"
        required: false
        type: string
        default: 'block'
      harden_runner_allowlist:
        description: 'Out-of-band harden-runner allow-list configuration'
        required: false
        type: string
        # yamllint disable-line rule:line-length
        default: 'lfreleng-actions//.github/harden-runner/lfreleng-actions/allow_list.txt@807a544b7e55a9224b2b3780e636467bd4b5b99b'  # v0.5.0

      # --- Gerrit-aware checkout (empty unless dispatched via Gerrit) ---
      gerrit_refspec:
        description: 'Gerrit refspec of the change under test'
        required: false
        type: string
        default: ''
      gerrit_project:
        description: 'Gerrit project name'
        required: false
        type: string
        default: ''
      gerrit_branch:
        description: 'Gerrit target branch'
        required: false
        type: string
        default: ''
      gerrit_url:
        description: >-
          Gerrit server URL. Empty falls back to the GERRIT_URL repository
          variable at runtime.
        required: false
        type: string
        default: ''

      # --- Release-only inputs ---
      attestations:
        description: >-
          Generate SLSA build provenance attestations for the release
          binaries (verifiable with `gh attestation verify`). Keep it
          toggleable for air-gapped or Gerrit-mirrored consumers that
          cannot reach Sigstore.
        required: false
        type: boolean
        default: true
      sigstore_sign:
        description: >-
          Sign the release checksums file with Sigstore (keyless/OIDC)
          via cosign sign-blob. Keep it toggleable for air-gapped or
          Gerrit-mirrored consumers that cannot reach Sigstore.
        required: false
        type: boolean
        default: true

    outputs:
      tag:
        description: 'Validated release tag/version string'
        value: ${{ jobs.tag-validate.outputs.tag }}

permissions: {}

jobs:
  gerrit-validate:
    name: 'Validate Gerrit Inputs'
    # Fails fast with a clear message when gerrit_refspec is set without
    # the project/branch the Gerrit checkout path also requires. The
    # build-chain root job depends on this, so invalid Gerrit inputs stop
    # the pipeline early and cleanly. This job always runs (only the
    # validation step is conditional), so gating dependents on it does
    # not trip GitHub's "skipped need skips dependents" behaviour.
    # The job carries no harden-runner step by design: it performs pure
    # input-string validation with no checkout, artifacts or network
    # access, and loading the egress allow-list would itself add an
    # outbound call.
    runs-on: ubuntu-latest
    permissions: {}
    timeout-minutes: 2
    steps:
      - name: 'Require Gerrit project, branch and URL'
        if: inputs.gerrit_refspec != ''
        shell: bash
        env:
          GERRIT_PROJECT: ${{ inputs.gerrit_project }}
          GERRIT_BRANCH: ${{ inputs.gerrit_branch }}
          # yamllint disable-line rule:line-length
          GERRIT_URL: ${{ inputs.gerrit_url != '' && inputs.gerrit_url || vars.GERRIT_URL }}
        run: |
          # gerrit_refspec is set, so the Gerrit checkout path runs and
          # also requires gerrit_project, gerrit_branch and a resolvable
          # Gerrit URL (the gerrit_url input or the GERRIT_URL variable).
          missing=''
          if [ -z "${GERRIT_PROJECT}" ]; then
            missing="${missing} gerrit_project"
          fi
          if [ -z "${GERRIT_BRANCH}" ]; then
            missing="${missing} gerrit_branch"
          fi
          if [ -z "${GERRIT_URL}" ]; then
            missing="${missing} gerrit_url/GERRIT_URL"
          fi
          if [ -n "${missing}" ]; then
            echo "::error::gerrit_refspec is set but missing:${missing}"
            exit 1
          fi
          echo "Gerrit inputs validated ✅"

  repository-metadata:
    name: 'Repository Metadata'
    needs: gerrit-validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 5
    steps:
      - name: 'Load egress allow-list (block mode)'
        if: inputs.harden_runner_egress != 'audit'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/harden-runner-block-action@6db537b3e6d060c3287c5a3ce2c28b55b0af330d  # v0.2.1
        with:
          config: ${{ inputs.harden_runner_allowlist }}
      - name: 'Harden runner (block)'
        if: inputs.harden_runner_egress != 'audit'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            ${{ env.CONNECTION_ALLOW_LIST }}
      - name: 'Harden runner (audit)'
        if: inputs.harden_runner_egress == 'audit'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'audit'

      - name: 'Checkout Gerrit change'
        if: inputs.gerrit_refspec != ''
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/checkout-gerrit-change-action@8523d768952d9690702b4696a8310d2a84b1be39  # v1.0.1
        with:
          gerrit-refspec: ${{ inputs.gerrit_refspec }}
          gerrit-project: ${{ inputs.gerrit_project }}
          # yamllint disable-line rule:line-length
          gerrit-url: ${{ inputs.gerrit_url != '' && inputs.gerrit_url || vars.GERRIT_URL }}
          delay: '0s'
          ref: refs/heads/${{ inputs.gerrit_branch }}
      - name: 'Checkout repository'
        if: inputs.gerrit_refspec == ''
        # yamllint disable-line rule:line-length
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: 'Gather repository metadata'
        id: repo-metadata
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/repository-metadata-action@61e837ecf6a21ef991c14991b43560f592a50a24  # v0.2.3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          github_summary: 'true'
          gerrit_summary: ${{ inputs.gerrit_refspec != '' }}
          artifact_upload: 'true'
          artifact_formats: 'json'

  tag-validate:
    name: 'Validate Tag Push'
    needs: gerrit-validate
    runs-on: 'ubuntu-latest'
    permissions:
      contents: write  # Needed to draft a release
    timeout-minutes: 5
    outputs:
      tag: ${{ steps.tag-validate.outputs.tag_name }}
    steps:
      - name: 'Load egress allow-list (block mode)'
        if: inputs.harden_runner_egress != 'audit'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/harden-runner-block-action@6db537b3e6d060c3287c5a3ce2c28b55b0af330d  # v0.2.1
        with:
          config: ${{ inputs.harden_runner_allowlist }}
      - name: 'Harden runner (block)'
        if: inputs.harden_runner_egress != 'audit'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            ${{ env.CONNECTION_ALLOW_LIST }}
      - name: 'Harden runner (audit)'
        if: inputs.harden_runner_egress == 'audit'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'audit'

      - name: 'Checkout Gerrit change'
        if: inputs.gerrit_refspec != ''
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/checkout-gerrit-change-action@8523d768952d9690702b4696a8310d2a84b1be39  # v1.0.1
        with:
          gerrit-refspec: ${{ inputs.gerrit_refspec }}
          gerrit-project: ${{ inputs.gerrit_project }}
          # yamllint disable-line rule:line-length
          gerrit-url: ${{ inputs.gerrit_url != '' && inputs.gerrit_url || vars.GERRIT_URL }}
          delay: '0s'
          ref: refs/heads/${{ inputs.gerrit_branch }}
      - name: 'Checkout repository'
        if: inputs.gerrit_refspec == ''
        # yamllint disable-line rule:line-length
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref }}
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false

      - name: 'Verify pushed tag'
        id: 'tag-validate'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/tag-validate-action@bc8043ec074495cc8cdf351623ebab3675d563cf  # v1.0.4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          require_type: 'semver'
          reject_development: 'true'
          require_github: 'true'
          # yamllint disable-line rule:line-length
          require_signed: 'ssh,gpg-unverifiable'  # Cannot verify GPG without key

      - name: 'Ensure draft release exists'
        id: 'ensure-release'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag-validate.outputs.tag_name }}
        run: |
          # Ensure draft release exists
          # Check if release exists and get its draft status
          if RELEASE_INFO=$(gh release view "$TAG" \
            --json isDraft 2>/dev/null); then
            IS_DRAFT=$(echo "$RELEASE_INFO" | jq -r '.isDraft')
            if [ "$IS_DRAFT" = "true" ]; then
              echo "Draft release for tag $TAG already exists"
            else
              echo "::error::A published release already exists for $TAG;" \
                "delete or recreate it as a draft, then re-run."
              exit 1
            fi
          else
            echo "Creating draft release for tag $TAG"
            gh release create "$TAG" \
              --draft \
              --title "Release $TAG" \
              --notes "Automated release for $TAG"
          fi

  release-matrix:
    name: 'Release Build Matrix'
    needs: gerrit-validate
    runs-on: ubuntu-latest
    outputs:
      matrix_json: ${{ steps.matrix.outputs.matrix_json }}
      # Main-package detection runs here (a non-matrix job) because
      # job outputs from matrix jobs are not reliably aggregated;
      # downstream jobs gate on these outputs deterministically.
      build_binary: ${{ steps.detect.outputs.build_binary }}
      build_target: ${{ steps.detect.outputs.target }}
    permissions:
      contents: read
    timeout-minutes: 5
    steps:
      - name: 'Load egress allow-list (block mode)'
        if: inputs.harden_runner_egress != 'audit'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/harden-runner-block-action@6db537b3e6d060c3287c5a3ce2c28b55b0af330d  # v0.2.1
        with:
          config: ${{ inputs.harden_runner_allowlist }}
      - name: 'Harden runner (block)'
        if: inputs.harden_runner_egress != 'audit'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            ${{ env.CONNECTION_ALLOW_LIST }}
      - name: 'Harden runner (audit)'
        if: inputs.harden_runner_egress == 'audit'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'audit'

      - name: 'Compute GOOS/GOARCH build matrix'
        id: matrix
        shell: bash
        env:
          RELEASE_GOOS: ${{ inputs.release_goos }}
          RELEASE_GOARCH: ${{ inputs.release_goarch }}
        run: |
          # Expand the comma-separated release_goos/release_goarch lists
          # into a matrix include list, excluding the windows/arm64 pair.
          include='[]'
          IFS=',' read -ra os_list <<< "${RELEASE_GOOS}"
          IFS=',' read -ra arch_list <<< "${RELEASE_GOARCH}"
          for goos in "${os_list[@]}"; do
            goos="$(echo "${goos}" | xargs)"
            [ -n "${goos}" ] || continue
            for goarch in "${arch_list[@]}"; do
              goarch="$(echo "${goarch}" | xargs)"
              [ -n "${goarch}" ] || continue
              if [ "${goos}" = "windows" ] && [ "${goarch}" = "arm64" ]
              then
                continue
              fi
              include=$(jq -c \
                --arg goos "${goos}" --arg goarch "${goarch}" \
                '. + [{goos: $goos, goarch: $goarch}]' <<< "${include}")
            done
          done
          matrix_json=$(jq -cn --argjson inc "${include}" \
            '{include: $inc}')
          count=$(jq '.include | length' <<< "${matrix_json}")
          if [ "${count}" = "0" ]; then
            echo "::error::release_goos/release_goarch produced an" \
              "empty build matrix"
            exit 1
          fi
          echo "Release build matrix: ${matrix_json}"
          echo "matrix_json=${matrix_json}" >> "$GITHUB_OUTPUT"

      - name: 'Checkout Gerrit change'
        if: inputs.gerrit_refspec != ''
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/checkout-gerrit-change-action@8523d768952d9690702b4696a8310d2a84b1be39  # v1.0.1
        with:
          gerrit-refspec: ${{ inputs.gerrit_refspec }}
          gerrit-project: ${{ inputs.gerrit_project }}
          # yamllint disable-line rule:line-length
          gerrit-url: ${{ inputs.gerrit_url != '' && inputs.gerrit_url || vars.GERRIT_URL }}
          delay: '0s'
          ref: refs/heads/${{ inputs.gerrit_branch }}
      - name: 'Checkout repository'
        if: inputs.gerrit_refspec == ''
        # yamllint disable-line rule:line-length
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref }}
          persist-credentials: false

      - name: 'Set up Go'
        # yamllint disable-line rule:line-length
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6.5.0
        with:
          go-version: ${{ inputs.go_version }}
          go-version-file: ${{ inputs.path_prefix }}/go.mod
          cache: false

      - name: 'Detect buildable main package'
        id: detect
        shell: bash
        env:
          PATH_PREFIX: ${{ inputs.path_prefix }}
          BUILD_TARGET: ${{ inputs.build_target }}
        run: |
          # Determine whether the project provides a buildable main
          # package. Library projects without one get a compile check
          # in the build job and no binary release artefacts.
          cd "${PATH_PREFIX}"
          target=''
          case "${BUILD_TARGET}" in
            *' '*)
              # Multiple package patterns cannot name the single main
              # package a release binary needs; run the compile check
              # over them instead of probing
              echo "::notice::build_target lists multiple package" \
                "patterns; skipping binary artefacts and running a" \
                "compile check"
              echo "build_binary=false" >> "$GITHUB_OUTPUT"
              exit 0
              ;;
          esac
          if [ -n "${BUILD_TARGET}" ] && [ "${BUILD_TARGET}" != "./..." ]
          then
            pkg_name=$(go list -f '{{.Name}}' "${BUILD_TARGET}" \
              2>/dev/null || true)
            if [ "${pkg_name}" = "main" ]; then
              target="${BUILD_TARGET}"
            fi
          fi
          if [ -z "${target}" ]; then
            pkg_name=$(go list -f '{{.Name}}' . 2>/dev/null || true)
            if [ "${pkg_name}" = "main" ]; then
              target='.'
            fi
          fi
          if [ -z "${target}" ] && [ -d cmd ]; then
            for dir in ./cmd/*/; do
              [ -d "${dir}" ] || continue
              pkg_name=$(go list -f '{{.Name}}' "${dir}" \
                2>/dev/null || true)
              if [ "${pkg_name}" = "main" ]; then
                target="${dir}"
                break
              fi
            done
          fi
          if [ -z "${target}" ]; then
            echo "build_binary=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No buildable main package detected; running" \
              "a compile check without binary release artefacts"
            exit 0
          fi
          echo "Main package: ${target}"
          {
            echo "build_binary=true"
            echo "target=${target}"
          } >> "$GITHUB_OUTPUT"

  build:
    name: 'Build (${{ matrix.goos }}/${{ matrix.goarch }})'
    needs:
      - 'tag-validate'
      - 'release-matrix'
    runs-on: 'ubuntu-latest'
    permissions:
      contents: read
    timeout-minutes: 12
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.release-matrix.outputs.matrix_json) }}
    steps:
      - name: 'Load egress allow-list (block mode)'
        if: inputs.harden_runner_egress != 'audit'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/harden-runner-block-action@6db537b3e6d060c3287c5a3ce2c28b55b0af330d  # v0.2.1
        with:
          config: ${{ inputs.harden_runner_allowlist }}
      - name: 'Harden runner (block)'
        if: inputs.harden_runner_egress != 'audit'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            ${{ env.CONNECTION_ALLOW_LIST }}
      - name: 'Harden runner (audit)'
        if: inputs.harden_runner_egress == 'audit'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'audit'

      - name: 'Checkout Gerrit change'
        if: inputs.gerrit_refspec != ''
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/checkout-gerrit-change-action@8523d768952d9690702b4696a8310d2a84b1be39  # v1.0.1
        with:
          gerrit-refspec: ${{ inputs.gerrit_refspec }}
          gerrit-project: ${{ inputs.gerrit_project }}
          # yamllint disable-line rule:line-length
          gerrit-url: ${{ inputs.gerrit_url != '' && inputs.gerrit_url || vars.GERRIT_URL }}
          delay: '0s'
          ref: refs/heads/${{ inputs.gerrit_branch }}
      - name: 'Checkout repository'
        if: inputs.gerrit_refspec == ''
        # yamllint disable-line rule:line-length
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref }}
          persist-credentials: false

      - name: 'Set up Go'
        # yamllint disable-line rule:line-length
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6.5.0
        with:
          go-version: ${{ inputs.go_version }}
          go-version-file: ${{ inputs.path_prefix }}/go.mod
          cache: false

      - name: 'Compute binary name'
        if: needs.release-matrix.outputs.build_binary == 'true'
        id: detect
        shell: bash
        env:
          OUTPUT_NAME: ${{ inputs.output_name }}
          TAG: ${{ needs.tag-validate.outputs.tag }}
          GOOS_TARGET: ${{ matrix.goos }}
          GOARCH_TARGET: ${{ matrix.goarch }}
        run: |
          # Main-package detection happens once in the release-matrix
          # job (matrix job outputs are unreliable); this step only
          # derives the per-target binary name.
          base_name="${OUTPUT_NAME}"
          if [ -z "${base_name}" ]; then
            base_name="${GITHUB_REPOSITORY##*/}"
          fi
          binary_name="${base_name}-${TAG}"
          binary_name="${binary_name}-${GOOS_TARGET}-${GOARCH_TARGET}"
          if [ "${GOOS_TARGET}" = "windows" ]; then
            binary_name="${binary_name}.exe"
          fi
          echo "Binary name: ${binary_name}"
          echo "binary_name=${binary_name}" >> "$GITHUB_OUTPUT"

      - name: 'Build release binary'
        if: needs.release-matrix.outputs.build_binary == 'true'
        id: build
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/go-build-action@3d4c7aef5040660688b5c35aaef0f0a91e11cb94  # v0.0.1
        with:
          go_version: ${{ inputs.go_version }}
          path_prefix: ${{ inputs.path_prefix }}
          goos: ${{ matrix.goos }}
          goarch: ${{ matrix.goarch }}
          cgo_enabled: '0'
          build_flags: '-trimpath ${{ inputs.build_flags }}'
          # yamllint disable-line rule:line-length
          ldflags: '-s -w -X main.version=${{ needs.tag-validate.outputs.tag }}'
          output_name: ${{ steps.detect.outputs.binary_name }}
          build_target: ${{ needs.release-matrix.outputs.build_target }}
          artifact_upload: 'true'
          artifact_name: 'binary-${{ matrix.goos }}-${{ matrix.goarch }}'

      - name: 'Compile check (no main package)'
        if: needs.release-matrix.outputs.build_binary != 'true'
        shell: bash
        env:
          PATH_PREFIX: ${{ inputs.path_prefix }}
          BUILD_TARGET: ${{ inputs.build_target }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          # Library project: verify the code compiles for this target,
          # honouring build_target so callers can exclude problematic
          # packages (e.g. plugin sources)
          cd "${PATH_PREFIX}"
          read -r -a targets <<< "${BUILD_TARGET:-./...}"
          go build "${targets[@]}"
          echo "Compile check passed for ${GOOS}/${GOARCH}"

  checksums:
    name: 'Generate Checksums'
    runs-on: ubuntu-latest
    needs:
      - 'build'
      - 'release-matrix'
    # yamllint disable-line rule:line-length
    if: ${{ !cancelled() && needs.build.result == 'success' && needs.release-matrix.outputs.build_binary == 'true' }}
    permissions:
      contents: read
    timeout-minutes: 5
    steps:
      - name: 'Load egress allow-list (block mode)'
        if: inputs.harden_runner_egress != 'audit'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/harden-runner-block-action@6db537b3e6d060c3287c5a3ce2c28b55b0af330d  # v0.2.1
        with:
          config: ${{ inputs.harden_runner_allowlist }}
      - name: 'Harden runner (block)'
        if: inputs.harden_runner_egress != 'audit'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            ${{ env.CONNECTION_ALLOW_LIST }}
      - name: 'Harden runner (audit)'
        if: inputs.harden_runner_egress == 'audit'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'audit'

      - name: 'Download release binaries'
        # yamllint disable-line rule:line-length
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: 'binary-*'
          merge-multiple: true
          path: 'dist'

      - name: 'Generate checksums.txt'
        shell: bash
        run: |
          # SHA-256 checksums over all release binaries
          cd dist
          sha256sum -- * > checksums.txt
          cat checksums.txt

      - name: 'Upload checksums'
        # yamllint disable-line rule:line-length
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: 'checksums'
          path: 'dist/checksums.txt'
          if-no-files-found: error

  sign-artefacts:
    name: 'Sign Checksums (Sigstore)'
    runs-on: ubuntu-latest
    needs: 'checksums'
    # yamllint disable-line rule:line-length
    if: ${{ !cancelled() && needs.checksums.result == 'success' && inputs.sigstore_sign }}
    permissions:
      contents: read
      id-token: write  # Needed for keyless (OIDC) cosign signing
    timeout-minutes: 5
    steps:
      - name: 'Load egress allow-list (block mode)'
        if: inputs.harden_runner_egress != 'audit'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/harden-runner-block-action@6db537b3e6d060c3287c5a3ce2c28b55b0af330d  # v0.2.1
        with:
          config: ${{ inputs.harden_runner_allowlist }}
      - name: 'Harden runner (block)'
        if: inputs.harden_runner_egress != 'audit'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            ${{ env.CONNECTION_ALLOW_LIST }}
      - name: 'Harden runner (audit)'
        if: inputs.harden_runner_egress == 'audit'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'audit'

      - name: 'Download checksums'
        # yamllint disable-line rule:line-length
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: 'checksums'

      - name: 'Install cosign'
        # yamllint disable-line rule:line-length
        uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad  # v4.0.0

      - name: 'Sign checksums with cosign'
        shell: bash
        run: |
          # Keyless signature over the checksums file; verify with:
          #   cosign verify-blob --bundle checksums.txt.sigstore.json \
          #     checksums.txt
          cosign sign-blob --yes \
            --bundle checksums.txt.sigstore.json \
            checksums.txt

      - name: 'Upload signature bundle'
        # yamllint disable-line rule:line-length
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: 'sigstore-bundle'
          path: 'checksums.txt.sigstore.json'
          if-no-files-found: error

  attest:
    name: 'Attest Build Provenance'
    runs-on: ubuntu-latest
    needs:
      - 'build'
      - 'release-matrix'
    # yamllint disable-line rule:line-length
    if: ${{ !cancelled() && needs.build.result == 'success' && needs.release-matrix.outputs.build_binary == 'true' && inputs.attestations }}
    permissions:
      contents: read
      id-token: write       # Needed for attestations
      attestations: write   # Needed for attestations
    timeout-minutes: 5
    steps:
      - name: 'Load egress allow-list (block mode)'
        if: inputs.harden_runner_egress != 'audit'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/harden-runner-block-action@6db537b3e6d060c3287c5a3ce2c28b55b0af330d  # v0.2.1
        with:
          config: ${{ inputs.harden_runner_allowlist }}
      - name: 'Harden runner (block)'
        if: inputs.harden_runner_egress != 'audit'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            ${{ env.CONNECTION_ALLOW_LIST }}
      - name: 'Harden runner (audit)'
        if: inputs.harden_runner_egress == 'audit'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'audit'

      - name: 'Download release binaries'
        # yamllint disable-line rule:line-length
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: 'binary-*'
          merge-multiple: true
          path: 'dist'

      # Generates SLSA build provenance for the release binaries,
      # verifiable with `gh attestation verify`.
      - name: 'Attest build provenance'
        # yamllint disable-line rule:line-length
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-path: 'dist/*'

  audit:
    name: 'Audit'
    runs-on: ubuntu-latest
    needs: 'build'
    if: ${{ !cancelled() && needs.build.result == 'success' }}
    permissions:
      contents: read
    timeout-minutes: 10
    steps:
      - name: 'Load egress allow-list (block mode)'
        if: inputs.harden_runner_egress != 'audit'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/harden-runner-block-action@6db537b3e6d060c3287c5a3ce2c28b55b0af330d  # v0.2.1
        with:
          config: ${{ inputs.harden_runner_allowlist }}
      - name: 'Harden runner (block)'
        if: inputs.harden_runner_egress != 'audit'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            ${{ env.CONNECTION_ALLOW_LIST }}
      - name: 'Harden runner (audit)'
        if: inputs.harden_runner_egress == 'audit'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'audit'

      - name: 'Checkout Gerrit change'
        if: inputs.gerrit_refspec != ''
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/checkout-gerrit-change-action@8523d768952d9690702b4696a8310d2a84b1be39  # v1.0.1
        with:
          gerrit-refspec: ${{ inputs.gerrit_refspec }}
          gerrit-project: ${{ inputs.gerrit_project }}
          # yamllint disable-line rule:line-length
          gerrit-url: ${{ inputs.gerrit_url != '' && inputs.gerrit_url || vars.GERRIT_URL }}
          delay: '0s'
          ref: refs/heads/${{ inputs.gerrit_branch }}
      - name: 'Checkout repository'
        if: inputs.gerrit_refspec == ''
        # yamllint disable-line rule:line-length
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref }}
          persist-credentials: false

      # The NO_BLOCK/soft-fail pattern: setting the audit_permit_fail
      # input, or setting the NO_BLOCK_AUDIT_FAIL repository variable
      # (an org/repo-wide override that soft-fails these checks even
      # when the caller passes false), disables failure propagation
      # via the action's permit_fail input.
      - name: 'Audit dependencies'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/go-audit-action@3164e5b31c230a782e4e8bb0e21f313307f703a9  # v0.0.1
        with:
          path_prefix: ${{ inputs.path_prefix }}
          go_version: ${{ inputs.go_version }}
          govulncheck: 'true'
          gosec: ${{ inputs.gosec }}
          staticcheck: ${{ inputs.staticcheck }}
          # yamllint disable-line rule:line-length
          permit_fail: ${{ inputs.audit_permit_fail || vars.NO_BLOCK_AUDIT_FAIL == 'true' }}

  sbom:
    name: 'Generate SBOM'
    runs-on: ubuntu-latest
    needs: 'build'
    if: ${{ !cancelled() && needs.build.result == 'success' }}
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: 'Load egress allow-list (block mode)'
        if: inputs.harden_runner_egress != 'audit'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/harden-runner-block-action@6db537b3e6d060c3287c5a3ce2c28b55b0af330d  # v0.2.1
        with:
          config: ${{ inputs.harden_runner_allowlist }}
      - name: 'Harden runner (block)'
        if: inputs.harden_runner_egress != 'audit'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            ${{ env.CONNECTION_ALLOW_LIST }}
      - name: 'Harden runner (audit)'
        if: inputs.harden_runner_egress == 'audit'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'audit'

      - name: 'Checkout Gerrit change'
        if: inputs.gerrit_refspec != ''
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/checkout-gerrit-change-action@8523d768952d9690702b4696a8310d2a84b1be39  # v1.0.1
        with:
          gerrit-refspec: ${{ inputs.gerrit_refspec }}
          gerrit-project: ${{ inputs.gerrit_project }}
          # yamllint disable-line rule:line-length
          gerrit-url: ${{ inputs.gerrit_url != '' && inputs.gerrit_url || vars.GERRIT_URL }}
          delay: '0s'
          ref: refs/heads/${{ inputs.gerrit_branch }}
      - name: 'Checkout repository'
        if: inputs.gerrit_refspec == ''
        # yamllint disable-line rule:line-length
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref }}
          persist-credentials: false

      # Emits sbom-cyclonedx.* at the workspace root (the Grype job
      # contract: the upload glob below and the downstream scan both
      # rely on this filename prefix).
      - name: 'Generate SBOM'
        id: sbom
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/sbom-action@df0b04bb49f19c0dca5e6e08a0c9080bf55d261e  # v0.0.1
        with:
          path_prefix: ${{ inputs.path_prefix }}
          filename_prefix: 'sbom-cyclonedx'
          output_directory: '.'

      - name: 'Upload SBOM artifacts'
        # yamllint disable-line rule:line-length
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: sbom-files
          # Glob matches whichever SBOM formats the generator produced
          path: sbom-cyclonedx.*
          retention-days: 45
          # Fail fast: the downstream Grype job requires this artifact,
          # so a missing/misnamed SBOM must surface here, not later
          if-no-files-found: error

      - name: 'SBOM summary'
        shell: bash
        env:
          COMPONENT_COUNT: ${{ steps.sbom.outputs.component_count }}
        run: |
          # SBOM summary
          {
            echo "## SBOM Summary"
            echo "CycloneDX SBOM with ${COMPONENT_COUNT} component(s)"
          } >> "$GITHUB_STEP_SUMMARY"

  grype:
    name: 'Grype Audit SBOM'
    runs-on: ubuntu-latest
    needs: 'sbom'
    if: ${{ !cancelled() && needs.sbom.result == 'success' }}
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: 'Load egress allow-list (block mode)'
        if: inputs.harden_runner_egress != 'audit'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/harden-runner-block-action@6db537b3e6d060c3287c5a3ce2c28b55b0af330d  # v0.2.1
        with:
          config: ${{ inputs.harden_runner_allowlist }}
      - name: 'Harden runner (block)'
        if: inputs.harden_runner_egress != 'audit'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            ${{ env.CONNECTION_ALLOW_LIST }}
      - name: 'Harden runner (audit)'
        if: inputs.harden_runner_egress == 'audit'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'audit'

      - name: 'Download SBOM artefact'
        # yamllint disable-line rule:line-length
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: sbom-files

      - name: 'Install Grype'
        id: grype
        # yamllint disable-line rule:line-length
        uses: anchore/scan-action/download-grype@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2  # v7.4.0
        with:
          cache-db: 'true'

      # Setting the grype_permit_fail input, or the NO_BLOCK_AUDIT_FAIL
      # repository variable (an org/repo-wide override that soft-fails
      # this check even when the caller passes false), disables failure
      # propagation so pull requests
      # can proceed when blocked by newly discovered CVEs in transitive
      # dependencies.
      - name: 'Grype audit SBOM'
        id: grype-audit
        env:
          GRYPE_CMD: ${{ steps.grype.outputs.cmd }}
          GRYPE_FAIL_ON: ${{ inputs.grype_fail_on }}
          # yamllint disable-line rule:line-length
          NO_BLOCK_AUDIT_FAIL: ${{ inputs.grype_permit_fail || vars.NO_BLOCK_AUDIT_FAIL == 'true' }}
        shell: bash
        run: |
          # The audit scans the JSON CycloneDX SBOM, which the sbom step
          # always generates. Guard anyway so the step still emits a
          # summary (and honours grype_permit_fail) if it is missing.
          if [ ! -f sbom-cyclonedx.json ]; then
            echo "::warning::No JSON SBOM found; Grype scan skipped"
            {
              echo "## Grype Vulnerability Scan"
              echo ""
              echo "No JSON SBOM available to scan."
            } >> "$GITHUB_STEP_SUMMARY"
            if [ "${NO_BLOCK_AUDIT_FAIL}" = "true" ]; then
              exit 0
            fi
            echo "::error::No JSON SBOM available for the Grype audit"
            exit 1
          fi

          # Run grype once, emitting all three output formats
          set +e
          "${GRYPE_CMD}" \
            -o "sarif=grype-results.sarif" \
            -o "json=grype-results.json" \
            -o "table=grype-results.txt" \
            --fail-on "${GRYPE_FAIL_ON}" \
            "sbom:sbom-cyclonedx.json"
          grype_exit=$?
          set -e

          echo "--- Grype scan results ---"
          if [ -f grype-results.txt ]; then
            cat grype-results.txt
          else
            echo "No table output produced"
          fi

          # grype returns 2 when it finds vulnerabilities at or above the
          # configured --fail-on threshold; any other non-zero exit is
          # treated as a grype failure.
          if [ "${grype_exit}" = "0" ]; then
            echo "No vulnerabilities at or above '${GRYPE_FAIL_ON}'"
            exit 0
          fi
          if [ "${grype_exit}" != "2" ]; then
            echo "::error::Grype exited with code ${grype_exit}"
            exit "${grype_exit}"
          fi

          if [ "${NO_BLOCK_AUDIT_FAIL}" = "true" ]; then
            echo "::warning::Grype found vulnerabilities at or above the" \
              "'${GRYPE_FAIL_ON}' threshold, but failures are permitted" \
              "so the job will not fail."
            exit 0
          fi
          echo "::error::Grype found vulnerabilities at or above the" \
            "'${GRYPE_FAIL_ON}' severity threshold. See the table above" \
            "for the offending packages and CVEs."
          exit 1

      - name: 'Upload Grype scan results'
        # yamllint disable-line rule:line-length
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: grype-scan-results
          path: |
            grype-results.sarif
            grype-results.json
            grype-results.txt
          retention-days: 90
          if-no-files-found: warn

      - name: 'Grype summary'
        if: always()
        shell: bash
        run: |
          # Render a Markdown summary of the Grype findings
          {
            echo "## Grype Vulnerability Scan"
            echo ""
            if [ ! -f grype-results.json ]; then
              echo "No scan results available"
              exit 0
            fi
            match_count=$(jq '.matches | length' grype-results.json)
            if [ "${match_count}" = "0" ]; then
              echo "No vulnerabilities found at or above the configured" \
                "severity threshold."
              exit 0
            fi
            echo "Found ${match_count} matching Grype record(s)."
          } >> "$GITHUB_STEP_SUMMARY"

  tests:
    name: 'Tests'
    runs-on: 'ubuntu-latest'
    # Deferred until the audit operations (audit and Grype) pass, so
    # the expensive test suite is skipped when either audit step fails
    # (gating inversion: audits gate tests on releases).
    needs:
      - 'build'
      - 'audit'
      - 'grype'
    # yamllint disable-line rule:line-length
    if: ${{ !cancelled() && needs.build.result == 'success' && needs.audit.result == 'success' && needs.grype.result == 'success' }}
    permissions:
      contents: read
    timeout-minutes: 15
    steps:
      - name: 'Load egress allow-list (block mode)'
        if: inputs.harden_runner_egress != 'audit'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/harden-runner-block-action@6db537b3e6d060c3287c5a3ce2c28b55b0af330d  # v0.2.1
        with:
          config: ${{ inputs.harden_runner_allowlist }}
      - name: 'Harden runner (block)'
        if: inputs.harden_runner_egress != 'audit'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            ${{ env.CONNECTION_ALLOW_LIST }}
      - name: 'Harden runner (audit)'
        if: inputs.harden_runner_egress == 'audit'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'audit'

      - name: 'Checkout Gerrit change'
        if: inputs.gerrit_refspec != ''
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/checkout-gerrit-change-action@8523d768952d9690702b4696a8310d2a84b1be39  # v1.0.1
        with:
          gerrit-refspec: ${{ inputs.gerrit_refspec }}
          gerrit-project: ${{ inputs.gerrit_project }}
          # yamllint disable-line rule:line-length
          gerrit-url: ${{ inputs.gerrit_url != '' && inputs.gerrit_url || vars.GERRIT_URL }}
          delay: '0s'
          ref: refs/heads/${{ inputs.gerrit_branch }}
      - name: 'Checkout repository'
        if: inputs.gerrit_refspec == ''
        # yamllint disable-line rule:line-length
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref }}
          persist-credentials: false

      # The NO_BLOCK/soft-fail pattern: setting the test_permit_fail
      # input, or setting the NO_BLOCK_AUDIT_FAIL repository variable
      # (an org/repo-wide override that soft-fails these checks even
      # when the caller passes false), disables failure propagation
      # via the action's permit_fail input.
      - name: 'Run tests'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/go-test-action@d4a80d07f236bb91e2bf0e00fdcbbaf303938941  # v0.0.1
        with:
          go_version: ${{ inputs.go_version }}
          path_prefix: ${{ inputs.path_prefix }}
          coverage: ${{ inputs.coverage }}
          race: ${{ inputs.race }}
          test_args: ${{ inputs.test_args }}
          # yamllint disable-line rule:line-length
          permit_fail: ${{ inputs.test_permit_fail || vars.NO_BLOCK_AUDIT_FAIL == 'true' }}
          artifact_upload: ${{ inputs.coverage }}

  attach-artefacts:
    name: 'Attach Artefacts to Release'
    runs-on: 'ubuntu-latest'
    needs:
      - 'tag-validate'
      - 'release-matrix'
      - 'build'
      - 'tests'
      - 'sbom'
      - 'checksums'
      - 'sign-artefacts'
      - 'attest'
    # The checksums/sign-artefacts/attest jobs skip for library
    # projects (or when signing/attestation toggles are off), so accept
    # both success and skipped from them.
    if: >-
      ${{ !cancelled()
          && needs.tests.result == 'success'
          && needs.sbom.result == 'success'
          && (needs.checksums.result == 'success'
              || needs.checksums.result == 'skipped')
          && (needs.sign-artefacts.result == 'success'
              || needs.sign-artefacts.result == 'skipped')
          && (needs.attest.result == 'success'
              || needs.attest.result == 'skipped') }}
    permissions:
      contents: write  # IMPORTANT: needed to edit release, attach artefacts
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: 'Load egress allow-list (block mode)'
        if: inputs.harden_runner_egress != 'audit'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/harden-runner-block-action@6db537b3e6d060c3287c5a3ce2c28b55b0af330d  # v0.2.1
        with:
          config: ${{ inputs.harden_runner_allowlist }}
      - name: 'Harden runner (block)'
        if: inputs.harden_runner_egress != 'audit'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            ${{ env.CONNECTION_ALLOW_LIST }}
      - name: 'Harden runner (audit)'
        if: inputs.harden_runner_egress == 'audit'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'audit'

      - name: 'Checkout Gerrit change'
        if: inputs.gerrit_refspec != ''
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/checkout-gerrit-change-action@8523d768952d9690702b4696a8310d2a84b1be39  # v1.0.1
        with:
          gerrit-refspec: ${{ inputs.gerrit_refspec }}
          gerrit-project: ${{ inputs.gerrit_project }}
          # yamllint disable-line rule:line-length
          gerrit-url: ${{ inputs.gerrit_url != '' && inputs.gerrit_url || vars.GERRIT_URL }}
          delay: '0s'
          ref: refs/heads/${{ inputs.gerrit_branch }}
      - name: 'Checkout repository'
        if: inputs.gerrit_refspec == ''
        # yamllint disable-line rule:line-length
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref }}
          persist-credentials: false

      - name: '⬇ Download release binaries'
        if: needs.release-matrix.outputs.build_binary == 'true'
        # yamllint disable-line rule:line-length
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: 'binary-*'
          merge-multiple: true
          path: 'dist'

      - name: '⬇ Download checksums'
        if: needs.checksums.result == 'success'
        # yamllint disable-line rule:line-length
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: 'checksums'
          path: 'dist'

      - name: '⬇ Download signature bundle'
        if: needs.sign-artefacts.result == 'success'
        # yamllint disable-line rule:line-length
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: 'sigstore-bundle'
          path: 'dist'

      - name: '⬇ Download SBOM files'
        # yamllint disable-line rule:line-length
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: 'sbom-files'
          path: 'dist'

      - name: 'Attach release artefacts'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/release-assets-action@22a6302f3d1775e4a192c45235cc7833a2781b12  # v0.1.1
        with:
          asset_paths: '["dist/**"]'
          release_tag: ${{ needs.tag-validate.outputs.tag }}

  promote-release:
    name: 'Promote Draft Release'
    needs:
      - 'tag-validate'
      - 'attach-artefacts'
    runs-on: 'ubuntu-latest'
    permissions:
      contents: write  # IMPORTANT: needed for draft release promotion
    timeout-minutes: 2
    outputs:
      # yamllint disable-line rule:line-length
      release_url: ${{ steps.promote-release.outputs.release_url || steps.set-promoted-url.outputs.release_url }}
    steps:
      - name: 'Load egress allow-list (block mode)'
        if: inputs.harden_runner_egress != 'audit'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/harden-runner-block-action@6db537b3e6d060c3287c5a3ce2c28b55b0af330d  # v0.2.1
        with:
          config: ${{ inputs.harden_runner_allowlist }}
      - name: 'Harden runner (block)'
        if: inputs.harden_runner_egress != 'audit'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            ${{ env.CONNECTION_ALLOW_LIST }}
      - name: 'Harden runner (audit)'
        if: inputs.harden_runner_egress == 'audit'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'audit'

      - name: 'Checkout Gerrit change'
        if: inputs.gerrit_refspec != ''
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/checkout-gerrit-change-action@8523d768952d9690702b4696a8310d2a84b1be39  # v1.0.1
        with:
          gerrit-refspec: ${{ inputs.gerrit_refspec }}
          gerrit-project: ${{ inputs.gerrit_project }}
          # yamllint disable-line rule:line-length
          gerrit-url: ${{ inputs.gerrit_url != '' && inputs.gerrit_url || vars.GERRIT_URL }}
          delay: '0s'
          ref: refs/heads/${{ inputs.gerrit_branch }}
      - name: 'Checkout repository'
        if: inputs.gerrit_refspec == ''
        # yamllint disable-line rule:line-length
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref }}
          persist-credentials: false

      - name: 'Check if release is already promoted'
        id: 'check-promoted'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.tag-validate.outputs.tag }}
        run: |
          # Check if release is already promoted
          if gh release view "$TAG" --json isDraft --jq '.isDraft' \
              2>/dev/null | grep -q "false"; then
            echo "Release $TAG is already promoted, skipping promotion"
            echo "already_promoted=true" >> "$GITHUB_OUTPUT"
          else
            echo "Release $TAG is draft or doesn't exist, " \
                 "proceeding with promotion"
            echo "already_promoted=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 'Promote draft release'
        id: 'promote-release'
        if: steps.check-promoted.outputs.already_promoted == 'false'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/draft-release-promote-action@072990900b99030363d81d4131c2bf2855f07df0  # v0.1.4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ needs.tag-validate.outputs.tag }}
          latest: true

      - name: 'Set release URL for already promoted release'
        id: 'set-promoted-url'
        if: steps.check-promoted.outputs.already_promoted == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.tag-validate.outputs.tag }}
        run: |
          # Set release URL for already promoted release
          RELEASE_URL=$(gh release view "$TAG" --json url --jq '.url')
          echo "release_url=$RELEASE_URL" >> "$GITHUB_OUTPUT"
