---
# SPDX-License-Identifier: Apache-2.0
# SPDX-FileCopyrightText: 2026 The Linux Foundation

# Reusable Go build/test pipeline.
#
# Reproduces the canonical Linux Foundation pipeline shape. The
# repository-metadata job runs in parallel as an informational step.
# The go-metadata job derives the Go version matrix from go.mod (or the
# go_version_matrix input). After build the jobs in { } run in parallel;
# none gates another, so a PR surfaces every failure (-> denotes
# sequence):
#   go-metadata -> build -> { tests | go-lint | audit | sbom -> grype }
#
# The harden-runner wiring, dual checkout (GitHub or Gerrit) and Grype
# scan follow the lfreleng-actions workflows-template conventions.
#
# Call this from a thin caller workflow; see examples/build-test/ for
# both a plain GitHub-native caller and a Gerrit-wrapped caller.
name: '[R] Go Build/Test'

# yamllint disable-line rule:truthy
on:
  workflow_call:
    inputs:
      # --- Checkout target (defaults to the calling repository) ---
      repository:
        description: 'Repository to check out (owner/name)'
        required: false
        type: string
        default: ''
      ref:
        description: >-
          Branch/tag/SHA to check out. Empty uses the triggering
          event's ref for same-repository checkouts, or the default
          branch when checking out a different repository.
        required: false
        type: string
        default: ''

      # --- Project layout ---
      path_prefix:
        description: 'Path to the project root directory'
        required: false
        type: string
        default: '.'

      # --- Go toolchain ---
      go_version_matrix:
        description: >-
          JSON array of Go versions to build/test against, e.g.
          '["1.25", "1.26"]'. Empty derives the matrix from go.mod
          via build-metadata-action.
        required: false
        type: string
        default: ''

      # --- Build ---
      build_target:
        description: >-
          Package(s) passed to go build. Projects whose tree carries
          Go plugin sources (package main without func main) need a
          narrower target than the ./... default.
        required: false
        type: string
        default: './...'
      build_flags:
        description: 'Extra flags passed to go build'
        required: false
        type: string
        default: ''
      cgo_enabled:
        description: >-
          CGO_ENABLED value for the build job ('0' or '1'). Set to '1' for
          modules with cgo dependencies (for example confluent-kafka-go).
          The test, lint and audit jobs rely on the Go toolchain default.
        required: false
        type: string
        default: '0'

      # --- Tests ---
      tests_enabled:
        description: 'Run the tests job (set false to skip tests)'
        required: false
        type: boolean
        default: true
      test_args:
        description: 'Extra arguments passed to go test'
        required: false
        type: string
        default: ''
      test_make_args:
        description: >-
          When set, run the project's Makefile via make-action instead of
          the built-in 'go test' (a build+test hook for projects that must
          run build steps first, e.g. compiling Go plugins). Runs
          'make -C <path_prefix> <test_make_args>'. The coverage, race and
          test_args inputs do not apply on this path.
        required: false
        type: string
        default: ''
      coverage:
        description: 'Collect and report test coverage'
        required: false
        type: boolean
        default: true
      race:
        description: 'Run tests with the Go race detector'
        required: false
        type: boolean
        default: true
      test_permit_fail:
        description: 'Permit test failures without failing the workflow'
        required: false
        type: boolean
        default: false
      test_artifact_path:
        description: >-
          Path (relative to path_prefix) of test output/reports to
          upload as a workflow artefact; empty disables the upload
        required: false
        type: string
        default: ''

      # --- Lint ---
      lint_version:
        description: >-
          golangci-lint version to install (pinned for reproducible
          lint results; bump deliberately)
        required: false
        type: string
        default: 'v2.12.2'
      lint_permit_fail:
        description: 'Permit golangci-lint failures (the NO_BLOCK pattern)'
        required: false
        type: boolean
        default: false

      # --- Audit ---
      audit_enabled:
        description: 'Run the dependency audit job (set false to skip)'
        required: false
        type: boolean
        default: true
      gosec:
        description: 'Run the gosec security scanner during the audit'
        required: false
        type: boolean
        default: false
      staticcheck:
        description: 'Run staticcheck during the audit'
        required: false
        type: boolean
        default: false
      audit_permit_fail:
        description: 'Permit dependency audit failures (the NO_BLOCK pattern)'
        required: false
        type: boolean
        default: false

      # --- SBOM/Grype scan ---
      sbom_enabled:
        description: >-
          Generate an SBOM (set false to skip; also skips the
          dependent Grype scan job)
        required: false
        type: boolean
        default: true
      grype_fail_on:
        description: 'Minimum severity that fails the Grype scan'
        required: false
        type: string
        default: 'medium'
      grype_permit_fail:
        description: >-
          Permit Grype findings without failing the job. When false, falls
          back to the NO_BLOCK_AUDIT_FAIL repository variable at runtime.
        required: false
        type: boolean
        default: false

      # --- Job timeouts ---
      build_timeout_minutes:
        description: 'Timeout (minutes) for the build job'
        required: false
        type: number
        default: 10
      test_timeout_minutes:
        description: 'Timeout (minutes) for the tests job'
        required: false
        type: number
        default: 15
      audit_timeout_minutes:
        description: 'Timeout (minutes) for the audit, SBOM and Grype jobs'
        required: false
        type: number
        default: 10

      # --- Runner hardening ---
      harden_runner_egress:
        description: "Harden-runner egress policy: 'block' or 'audit'"
        required: false
        type: string
        default: 'block'
      harden_runner_allowlist:
        description: 'Out-of-band harden-runner allow-list configuration'
        required: false
        type: string
        # yamllint disable-line rule:line-length
        default: 'lfreleng-actions//.github/harden-runner/lfreleng-actions/allow_list.txt@807a544b7e55a9224b2b3780e636467bd4b5b99b'  # v0.5.0

      # --- Gerrit-aware checkout (empty unless dispatched via Gerrit) ---
      gerrit_refspec:
        description: 'Gerrit refspec of the change under test'
        required: false
        type: string
        default: ''
      gerrit_project:
        description: 'Gerrit project name'
        required: false
        type: string
        default: ''
      gerrit_branch:
        description: 'Gerrit target branch'
        required: false
        type: string
        default: ''
      gerrit_url:
        description: >-
          Gerrit server URL. Empty falls back to the GERRIT_URL repository
          variable at runtime.
        required: false
        type: string
        default: ''

permissions: {}

jobs:
  gerrit-validate:
    name: 'Validate Workflow Inputs'
    # Fails fast with a clear message on invalid workflow inputs: the
    # test artefact path, job timeouts, and the Gerrit parameters (when
    # gerrit_refspec is set without the project/branch the Gerrit
    # checkout path also requires). The build-chain root job depends on
    # this, so invalid inputs stop the pipeline early and cleanly. This
    # job always runs (only some validation steps are conditional), so
    # gating dependents on it does not trip GitHub's "skipped need
    # skips dependents" behaviour.
    # The job carries no harden-runner step by design: it performs pure
    # input-string validation with no checkout, artifacts or network
    # access, and loading the egress allow-list would itself add an
    # outbound call.
    runs-on: ubuntu-latest
    permissions: {}
    timeout-minutes: 2
    steps:
      - name: 'Validate path_prefix input'
        shell: bash
        env:
          PATH_PREFIX: ${{ inputs.path_prefix }}
        run: |
          # Require a relative, non-traversing path: later jobs cd
          # into it and derive artefact/publish paths from it, so an
          # empty value, absolute paths or .. segments could escape
          # the checkout
          # A single trailing slash is tolerated ('./' == '.',
          # 'subdir/' == 'subdir')
          PATH_PREFIX="${PATH_PREFIX%/}"
          if [ "${PATH_PREFIX}" = '.' ]; then
            exit 0
          fi
          if [[ ! "${PATH_PREFIX}" =~ ^[A-Za-z0-9._-]+(/[A-Za-z0-9._-]+)*$ ]] \
            || [[ "${PATH_PREFIX}" =~ (^|/)\.\.(/|$) ]]; then
            echo "::error::Invalid path_prefix input: ${PATH_PREFIX}"
            exit 1
          fi

      - name: 'Validate test_artifact_path input'
        if: inputs.test_artifact_path != ''
        shell: bash
        env:
          TEST_ARTIFACT_PATH: ${{ inputs.test_artifact_path }}
        run: |
          # Require a relative, non-traversing path (the * wildcard
          # permitted): the tests job joins it onto path_prefix for
          # the artefact upload, so absolute paths or .. segments
          # could pull in files from outside the checkout
          valid='^[A-Za-z0-9._*-]+(/[A-Za-z0-9._*-]+)*/?$'
          if [[ ! "${TEST_ARTIFACT_PATH}" =~ ${valid} ]] \
            || [[ "${TEST_ARTIFACT_PATH}" =~ (^|/)\.\.(/|$) ]]; then
            echo "::error::Invalid test_artifact_path input:" \
              "${TEST_ARTIFACT_PATH}"
            exit 1
          fi

      - name: 'Validate job timeout inputs'
        shell: bash
        env:
          BUILD_TIMEOUT: ${{ inputs.build_timeout_minutes }}
          TEST_TIMEOUT: ${{ inputs.test_timeout_minutes }}
          AUDIT_TIMEOUT: ${{ inputs.audit_timeout_minutes }}
        run: |
          # Require whole-minute timeouts in the range 1-360 (the
          # GitHub-hosted runner job cap). Values GitHub itself
          # rejects (e.g. fractional numbers) can fail workflow
          # evaluation before this step runs; for values that do
          # reach it (zero, negative or out-of-range), this gives a
          # clear fail-fast error
          error=0
          for entry in \
            "build_timeout_minutes=${BUILD_TIMEOUT}" \
            "test_timeout_minutes=${TEST_TIMEOUT}" \
            "audit_timeout_minutes=${AUDIT_TIMEOUT}"; do
            name="${entry%%=*}"; value="${entry#*=}"
            if [[ ! "${value}" =~ ^[0-9]+$ ]] \
              || [ "${value}" -lt 1 ] || [ "${value}" -gt 360 ]; then
              echo "::error::Invalid ${name} input: ${value}"
              error=1
            fi
          done
          exit "${error}"

      - name: 'Require Gerrit project, branch and URL'
        if: inputs.gerrit_refspec != ''
        shell: bash
        env:
          GERRIT_PROJECT: ${{ inputs.gerrit_project }}
          GERRIT_BRANCH: ${{ inputs.gerrit_branch }}
          # yamllint disable-line rule:line-length
          GERRIT_URL: ${{ inputs.gerrit_url != '' && inputs.gerrit_url || vars.GERRIT_URL }}
        run: |
          # gerrit_refspec is set, so the Gerrit checkout path runs and
          # also requires gerrit_project, gerrit_branch and a resolvable
          # Gerrit URL (the gerrit_url input or the GERRIT_URL variable).
          missing=''
          if [ -z "${GERRIT_PROJECT}" ]; then
            missing="${missing} gerrit_project"
          fi
          if [ -z "${GERRIT_BRANCH}" ]; then
            missing="${missing} gerrit_branch"
          fi
          if [ -z "${GERRIT_URL}" ]; then
            missing="${missing} gerrit_url/GERRIT_URL"
          fi
          if [ -n "${missing}" ]; then
            echo "::error::gerrit_refspec is set but missing:${missing}"
            exit 1
          fi
          echo "Gerrit inputs validated ✅"

  repository-metadata:
    name: 'Repository Metadata'
    needs: gerrit-validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read  # repository-metadata-action queries PR data
    timeout-minutes: 5
    steps:
      - name: 'Load egress allow-list (block mode)'
        if: inputs.harden_runner_egress != 'audit'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/harden-runner-block-action@6db537b3e6d060c3287c5a3ce2c28b55b0af330d  # v0.2.1
        with:
          config: ${{ inputs.harden_runner_allowlist }}
      - name: 'Harden runner (block)'
        if: inputs.harden_runner_egress != 'audit'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            ${{ env.CONNECTION_ALLOW_LIST }}
      - name: 'Harden runner (audit)'
        if: inputs.harden_runner_egress == 'audit'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'audit'

      - name: 'Checkout Gerrit change'
        if: inputs.gerrit_refspec != ''
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/checkout-gerrit-change-action@f87b90a3370e62dad310797fedc7fd3700c75832  # v1.0.2
        with:
          gerrit-refspec: ${{ inputs.gerrit_refspec }}
          gerrit-project: ${{ inputs.gerrit_project }}
          # yamllint disable-line rule:line-length
          gerrit-url: ${{ inputs.gerrit_url != '' && inputs.gerrit_url || vars.GERRIT_URL }}
          delay: '0s'
          ref: refs/heads/${{ inputs.gerrit_branch }}
      - name: 'Checkout repository'
        if: inputs.gerrit_refspec == ''
        # yamllint disable-line rule:line-length
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: 'Gather repository metadata'
        id: repo-metadata
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/repository-metadata-action@61e837ecf6a21ef991c14991b43560f592a50a24  # v0.2.3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          github_summary: 'true'
          gerrit_summary: ${{ inputs.gerrit_refspec != '' }}
          artifact_upload: 'true'
          artifact_formats: 'json'

  go-metadata:
    name: 'Go Metadata'
    needs: gerrit-validate
    runs-on: ubuntu-latest
    outputs:
      matrix_json: ${{ steps.matrix.outputs.matrix_json }}
      # Newest matrix entry; jobs that need one modern toolchain
      # (audit tooling) use this instead of the go.mod version, which
      # can predate the audit tools' own minimum Go requirement
      latest_go_version: ${{ steps.matrix.outputs.latest_go_version }}
    permissions:
      contents: read
    timeout-minutes: 5
    steps:
      - name: 'Load egress allow-list (block mode)'
        if: inputs.harden_runner_egress != 'audit'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/harden-runner-block-action@6db537b3e6d060c3287c5a3ce2c28b55b0af330d  # v0.2.1
        with:
          config: ${{ inputs.harden_runner_allowlist }}
      - name: 'Harden runner (block)'
        if: inputs.harden_runner_egress != 'audit'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            ${{ env.CONNECTION_ALLOW_LIST }}
      - name: 'Harden runner (audit)'
        if: inputs.harden_runner_egress == 'audit'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'audit'

      - name: 'Checkout Gerrit change'
        if: inputs.gerrit_refspec != ''
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/checkout-gerrit-change-action@f87b90a3370e62dad310797fedc7fd3700c75832  # v1.0.2
        with:
          gerrit-refspec: ${{ inputs.gerrit_refspec }}
          gerrit-project: ${{ inputs.gerrit_project }}
          # yamllint disable-line rule:line-length
          gerrit-url: ${{ inputs.gerrit_url != '' && inputs.gerrit_url || vars.GERRIT_URL }}
          delay: '0s'
          ref: refs/heads/${{ inputs.gerrit_branch }}
      - name: 'Checkout repository'
        if: inputs.gerrit_refspec == ''
        # yamllint disable-line rule:line-length
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref }}
          persist-credentials: false

      - name: 'Gather build metadata'
        id: metadata
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/build-metadata-action@441d941775995fa0d562ee80b4cc6ed1230248ec  # v0.6.0
        with:
          path_prefix: ${{ inputs.path_prefix }}

      - name: 'Resolve Go version matrix'
        id: matrix
        shell: bash
        env:
          GO_VERSION_MATRIX: ${{ inputs.go_version_matrix }}
          DETECTED_MATRIX_JSON: ${{ steps.metadata.outputs.go_matrix_json }}
        run: |
          # The go_version_matrix input (a JSON array string) overrides
          # the Go versions build-metadata-action detects from go.mod.
          if [ -n "${GO_VERSION_MATRIX}" ]; then
            matrix_json=$(jq -cn --argjson versions "${GO_VERSION_MATRIX}" \
              '{"go-version": $versions}')
          else
            matrix_json="${DETECTED_MATRIX_JSON}"
          fi
          if [ -z "${matrix_json}" ]; then
            echo "::error::Unable to resolve a Go version matrix"
            exit 1
          fi
          # Validate shape early for an actionable error: the value
          # must be JSON carrying a non-empty go-version array, or the
          # downstream strategy.matrix evaluation fails cryptically
          count=$(jq -e '."go-version" | length' \
            <<< "${matrix_json}" 2>/dev/null || echo '0')
          if [ "${count}" = "0" ]; then
            echo "::error::Resolved Go version matrix is empty or" \
              "malformed: ${matrix_json}"
            exit 1
          fi
          # sort -V picks the true maximum even when the caller
          # supplies an unsorted go_version_matrix
          latest_version=$(jq -r '."go-version"[]' \
            <<< "${matrix_json}" | sort -V | tail -n1)
          echo "Go version matrix: ${matrix_json}"
          echo "Latest Go version: ${latest_version}"
          {
            echo "matrix_json=${matrix_json}"
            echo "latest_go_version=${latest_version}"
          } >> "$GITHUB_OUTPUT"

  build:
    name: 'Build (Go ${{ matrix.go-version }})'
    needs: go-metadata
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: ${{ inputs.build_timeout_minutes }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.go-metadata.outputs.matrix_json) }}
    steps:
      - name: 'Load egress allow-list (block mode)'
        if: inputs.harden_runner_egress != 'audit'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/harden-runner-block-action@6db537b3e6d060c3287c5a3ce2c28b55b0af330d  # v0.2.1
        with:
          config: ${{ inputs.harden_runner_allowlist }}
      - name: 'Harden runner (block)'
        if: inputs.harden_runner_egress != 'audit'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            ${{ env.CONNECTION_ALLOW_LIST }}
      - name: 'Harden runner (audit)'
        if: inputs.harden_runner_egress == 'audit'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'audit'

      - name: 'Checkout Gerrit change'
        if: inputs.gerrit_refspec != ''
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/checkout-gerrit-change-action@f87b90a3370e62dad310797fedc7fd3700c75832  # v1.0.2
        with:
          gerrit-refspec: ${{ inputs.gerrit_refspec }}
          gerrit-project: ${{ inputs.gerrit_project }}
          # yamllint disable-line rule:line-length
          gerrit-url: ${{ inputs.gerrit_url != '' && inputs.gerrit_url || vars.GERRIT_URL }}
          delay: '0s'
          ref: refs/heads/${{ inputs.gerrit_branch }}
      - name: 'Checkout repository'
        if: inputs.gerrit_refspec == ''
        # yamllint disable-line rule:line-length
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref }}
          persist-credentials: false

      - name: 'Build project'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/go-build-action@3d4c7aef5040660688b5c35aaef0f0a91e11cb94  # v0.0.1
        with:
          go_version: ${{ matrix.go-version }}
          path_prefix: ${{ inputs.path_prefix }}
          build_flags: ${{ inputs.build_flags }}
          build_target: ${{ inputs.build_target }}
          cgo_enabled: ${{ inputs.cgo_enabled }}
          artifact_upload: 'false'

  tests:
    name: 'Tests (Go ${{ matrix.go-version }})'
    runs-on: ubuntu-latest
    needs:
      - 'go-metadata'
      - 'build'
    # yamllint disable-line rule:line-length
    if: ${{ !cancelled() && needs.build.result == 'success' && inputs.tests_enabled }}
    permissions:
      contents: read
    timeout-minutes: ${{ inputs.test_timeout_minutes }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.go-metadata.outputs.matrix_json) }}
    steps:
      - name: 'Load egress allow-list (block mode)'
        if: inputs.harden_runner_egress != 'audit'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/harden-runner-block-action@6db537b3e6d060c3287c5a3ce2c28b55b0af330d  # v0.2.1
        with:
          config: ${{ inputs.harden_runner_allowlist }}
      - name: 'Harden runner (block)'
        if: inputs.harden_runner_egress != 'audit'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            ${{ env.CONNECTION_ALLOW_LIST }}
      - name: 'Harden runner (audit)'
        if: inputs.harden_runner_egress == 'audit'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'audit'

      - name: 'Checkout Gerrit change'
        if: inputs.gerrit_refspec != ''
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/checkout-gerrit-change-action@f87b90a3370e62dad310797fedc7fd3700c75832  # v1.0.2
        with:
          gerrit-refspec: ${{ inputs.gerrit_refspec }}
          gerrit-project: ${{ inputs.gerrit_project }}
          # yamllint disable-line rule:line-length
          gerrit-url: ${{ inputs.gerrit_url != '' && inputs.gerrit_url || vars.GERRIT_URL }}
          delay: '0s'
          ref: refs/heads/${{ inputs.gerrit_branch }}
      - name: 'Checkout repository'
        if: inputs.gerrit_refspec == ''
        # yamllint disable-line rule:line-length
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref }}
          persist-credentials: false

      # The NO_BLOCK/soft-fail pattern: setting the test_permit_fail
      # input, or setting the NO_BLOCK_AUDIT_FAIL repository variable
      # (an org/repo-wide override that soft-fails these checks even
      # when the caller passes false), disables failure propagation
      # via the action's permit_fail input.
      - name: 'Run tests'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/go-test-action@5caee8cfff691851b3eed6748373d5aabfd926a7  # v0.1.0
        with:
          go_version: ${{ matrix.go-version }}
          path_prefix: ${{ inputs.path_prefix }}
          coverage: ${{ inputs.coverage }}
          race: ${{ inputs.race }}
          test_args: ${{ inputs.test_args }}
          make_args: ${{ inputs.test_make_args }}
          # yamllint disable-line rule:line-length
          permit_fail: ${{ inputs.test_permit_fail || vars.NO_BLOCK_AUDIT_FAIL == 'true' }}
          # Coverage artifact upload requires coverage; unique name per
          # matrix leg to avoid artifact name collisions.
          artifact_upload: ${{ inputs.coverage }}
          artifact_name: 'test-coverage-go-${{ matrix.go-version }}'

      # Unique artifact name per matrix leg to avoid collisions
      - name: 'Upload test artefacts'
        if: ${{ !cancelled() && inputs.test_artifact_path != '' }}
        # yamllint disable-line rule:line-length
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: go-test-results-${{ matrix.go-version }}
          path: ${{ inputs.path_prefix }}/${{ inputs.test_artifact_path }}
          retention-days: 7
          if-no-files-found: warn

  go-lint:
    name: 'Lint'
    runs-on: ubuntu-latest
    needs: 'build'
    if: ${{ !cancelled() && needs.build.result == 'success' }}
    permissions:
      contents: read
    timeout-minutes: 15
    steps:
      - name: 'Load egress allow-list (block mode)'
        if: inputs.harden_runner_egress != 'audit'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/harden-runner-block-action@6db537b3e6d060c3287c5a3ce2c28b55b0af330d  # v0.2.1
        with:
          config: ${{ inputs.harden_runner_allowlist }}
      - name: 'Harden runner (block)'
        if: inputs.harden_runner_egress != 'audit'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            ${{ env.CONNECTION_ALLOW_LIST }}
      - name: 'Harden runner (audit)'
        if: inputs.harden_runner_egress == 'audit'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'audit'

      - name: 'Checkout Gerrit change'
        if: inputs.gerrit_refspec != ''
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/checkout-gerrit-change-action@f87b90a3370e62dad310797fedc7fd3700c75832  # v1.0.2
        with:
          gerrit-refspec: ${{ inputs.gerrit_refspec }}
          gerrit-project: ${{ inputs.gerrit_project }}
          # yamllint disable-line rule:line-length
          gerrit-url: ${{ inputs.gerrit_url != '' && inputs.gerrit_url || vars.GERRIT_URL }}
          delay: '0s'
          ref: refs/heads/${{ inputs.gerrit_branch }}
      - name: 'Checkout repository'
        if: inputs.gerrit_refspec == ''
        # yamllint disable-line rule:line-length
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref }}
          persist-credentials: false

      - name: 'Set up Go'
        # yamllint disable-line rule:line-length
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6.5.0
        with:
          go-version-file: ${{ inputs.path_prefix }}/go.mod
          cache: false

      # The NO_BLOCK/soft-fail pattern: setting the lint_permit_fail
      # input, or setting the NO_BLOCK_AUDIT_FAIL repository variable
      # (an org/repo-wide override that soft-fails these checks even
      # when the caller passes false), disables failure propagation
      # via continue-on-error.
      - name: 'Run golangci-lint'
        # yamllint disable-line rule:line-length
        continue-on-error: ${{ inputs.lint_permit_fail || vars.NO_BLOCK_AUDIT_FAIL == 'true' }}
        # yamllint disable-line rule:line-length
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a  # v9.3.0
        with:
          version: ${{ inputs.lint_version }}
          working-directory: ${{ inputs.path_prefix }}

  audit:
    name: 'Audit'
    runs-on: ubuntu-latest
    needs:
      - 'go-metadata'
      - 'build'
    # yamllint disable-line rule:line-length
    if: ${{ !cancelled() && needs.build.result == 'success' && inputs.audit_enabled }}
    permissions:
      contents: read
    timeout-minutes: ${{ inputs.audit_timeout_minutes }}
    steps:
      - name: 'Load egress allow-list (block mode)'
        if: inputs.harden_runner_egress != 'audit'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/harden-runner-block-action@6db537b3e6d060c3287c5a3ce2c28b55b0af330d  # v0.2.1
        with:
          config: ${{ inputs.harden_runner_allowlist }}
      - name: 'Harden runner (block)'
        if: inputs.harden_runner_egress != 'audit'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            ${{ env.CONNECTION_ALLOW_LIST }}
      - name: 'Harden runner (audit)'
        if: inputs.harden_runner_egress == 'audit'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'audit'

      - name: 'Checkout Gerrit change'
        if: inputs.gerrit_refspec != ''
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/checkout-gerrit-change-action@f87b90a3370e62dad310797fedc7fd3700c75832  # v1.0.2
        with:
          gerrit-refspec: ${{ inputs.gerrit_refspec }}
          gerrit-project: ${{ inputs.gerrit_project }}
          # yamllint disable-line rule:line-length
          gerrit-url: ${{ inputs.gerrit_url != '' && inputs.gerrit_url || vars.GERRIT_URL }}
          delay: '0s'
          ref: refs/heads/${{ inputs.gerrit_branch }}
      - name: 'Checkout repository'
        if: inputs.gerrit_refspec == ''
        # yamllint disable-line rule:line-length
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref }}
          persist-credentials: false

      # The NO_BLOCK/soft-fail pattern: setting the audit_permit_fail
      # input, or setting the NO_BLOCK_AUDIT_FAIL repository variable
      # (an org/repo-wide override that soft-fails these checks even
      # when the caller passes false), disables failure propagation
      # via the action's permit_fail input.
      - name: 'Audit dependencies'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/go-audit-action@3164e5b31c230a782e4e8bb0e21f313307f703a9  # v0.0.1
        with:
          path_prefix: ${{ inputs.path_prefix }}
          # The audit tools carry their own minimum Go requirements
          # (x/vuln v1.5.0 needs go >= 1.25), which legacy go.mod
          # versions cannot satisfy; install the newest matrix version
          go_version: ${{ needs.go-metadata.outputs.latest_go_version }}
          govulncheck: 'true'
          gosec: ${{ inputs.gosec }}
          staticcheck: ${{ inputs.staticcheck }}
          # yamllint disable-line rule:line-length
          permit_fail: ${{ inputs.audit_permit_fail || vars.NO_BLOCK_AUDIT_FAIL == 'true' }}

  sbom:
    name: 'Generate SBOM'
    runs-on: ubuntu-latest
    needs: 'build'
    # yamllint disable-line rule:line-length
    if: ${{ !cancelled() && needs.build.result == 'success' && inputs.sbom_enabled }}
    timeout-minutes: ${{ inputs.audit_timeout_minutes }}
    permissions:
      contents: read
    steps:
      - name: 'Load egress allow-list (block mode)'
        if: inputs.harden_runner_egress != 'audit'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/harden-runner-block-action@6db537b3e6d060c3287c5a3ce2c28b55b0af330d  # v0.2.1
        with:
          config: ${{ inputs.harden_runner_allowlist }}
      - name: 'Harden runner (block)'
        if: inputs.harden_runner_egress != 'audit'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            ${{ env.CONNECTION_ALLOW_LIST }}
      - name: 'Harden runner (audit)'
        if: inputs.harden_runner_egress == 'audit'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'audit'

      - name: 'Checkout Gerrit change'
        if: inputs.gerrit_refspec != ''
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/checkout-gerrit-change-action@f87b90a3370e62dad310797fedc7fd3700c75832  # v1.0.2
        with:
          gerrit-refspec: ${{ inputs.gerrit_refspec }}
          gerrit-project: ${{ inputs.gerrit_project }}
          # yamllint disable-line rule:line-length
          gerrit-url: ${{ inputs.gerrit_url != '' && inputs.gerrit_url || vars.GERRIT_URL }}
          delay: '0s'
          ref: refs/heads/${{ inputs.gerrit_branch }}
      - name: 'Checkout repository'
        if: inputs.gerrit_refspec == ''
        # yamllint disable-line rule:line-length
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref }}
          persist-credentials: false

      # Emits sbom-cyclonedx.* at the workspace root (the Grype job
      # contract: the upload glob below and the downstream scan both
      # rely on this filename prefix).
      - name: 'Generate SBOM'
        id: sbom
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/sbom-action@df0b04bb49f19c0dca5e6e08a0c9080bf55d261e  # v0.0.1
        with:
          path_prefix: ${{ inputs.path_prefix }}
          filename_prefix: 'sbom-cyclonedx'
          output_directory: '.'

      - name: 'Upload SBOM artifacts'
        # yamllint disable-line rule:line-length
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: sbom-files
          # Glob matches whichever SBOM formats the generator produced
          path: sbom-cyclonedx.*
          retention-days: 45
          # Fail fast: the downstream Grype job requires this artifact,
          # so a missing/misnamed SBOM must surface here, not later
          if-no-files-found: error

      - name: 'SBOM summary'
        shell: bash
        env:
          COMPONENT_COUNT: ${{ steps.sbom.outputs.component_count }}
        run: |
          # SBOM summary
          {
            echo "## SBOM Summary"
            echo "CycloneDX SBOM with ${COMPONENT_COUNT} component(s)"
          } >> "$GITHUB_STEP_SUMMARY"

  grype:
    name: 'Grype Audit SBOM'
    runs-on: ubuntu-latest
    needs: 'sbom'
    if: ${{ !cancelled() && needs.sbom.result == 'success' }}
    timeout-minutes: ${{ inputs.audit_timeout_minutes }}
    permissions:
      contents: read
    steps:
      - name: 'Load egress allow-list (block mode)'
        if: inputs.harden_runner_egress != 'audit'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/harden-runner-block-action@6db537b3e6d060c3287c5a3ce2c28b55b0af330d  # v0.2.1
        with:
          config: ${{ inputs.harden_runner_allowlist }}
      - name: 'Harden runner (block)'
        if: inputs.harden_runner_egress != 'audit'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            ${{ env.CONNECTION_ALLOW_LIST }}
      - name: 'Harden runner (audit)'
        if: inputs.harden_runner_egress == 'audit'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'audit'

      - name: 'Download SBOM artefact'
        # yamllint disable-line rule:line-length
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: sbom-files

      - name: 'Install Grype'
        id: grype
        # yamllint disable-line rule:line-length
        uses: anchore/scan-action/download-grype@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2  # v7.4.0
        with:
          cache-db: 'true'

      # Setting the grype_permit_fail input, or the NO_BLOCK_AUDIT_FAIL
      # repository variable (an org/repo-wide override that soft-fails
      # this check even when the caller passes false), disables failure
      # propagation so pull requests
      # can proceed when blocked by newly discovered CVEs in transitive
      # dependencies.
      - name: 'Grype audit SBOM'
        id: grype-audit
        env:
          GRYPE_CMD: ${{ steps.grype.outputs.cmd }}
          GRYPE_FAIL_ON: ${{ inputs.grype_fail_on }}
          # yamllint disable-line rule:line-length
          NO_BLOCK_AUDIT_FAIL: ${{ inputs.grype_permit_fail || vars.NO_BLOCK_AUDIT_FAIL == 'true' }}
        shell: bash
        run: |
          # The audit scans the JSON CycloneDX SBOM, which the sbom step
          # always generates. Guard anyway so the step still emits a
          # summary (and honours grype_permit_fail) if it is missing.
          if [ ! -f sbom-cyclonedx.json ]; then
            echo "::warning::No JSON SBOM found; Grype scan skipped"
            {
              echo "## Grype Vulnerability Scan"
              echo ""
              echo "No JSON SBOM available to scan."
            } >> "$GITHUB_STEP_SUMMARY"
            if [ "${NO_BLOCK_AUDIT_FAIL}" = "true" ]; then
              exit 0
            fi
            echo "::error::No JSON SBOM available for the Grype audit"
            exit 1
          fi

          # Run grype once, emitting all three output formats
          set +e
          "${GRYPE_CMD}" \
            -o "sarif=grype-results.sarif" \
            -o "json=grype-results.json" \
            -o "table=grype-results.txt" \
            --fail-on "${GRYPE_FAIL_ON}" \
            "sbom:sbom-cyclonedx.json"
          grype_exit=$?
          set -e

          echo "--- Grype scan results ---"
          if [ -f grype-results.txt ]; then
            cat grype-results.txt
          else
            echo "No table output produced"
          fi

          # grype returns 2 when it finds vulnerabilities at or above the
          # configured --fail-on threshold; any other non-zero exit is
          # treated as a grype failure.
          if [ "${grype_exit}" = "0" ]; then
            echo "No vulnerabilities at or above '${GRYPE_FAIL_ON}'"
            exit 0
          fi
          if [ "${grype_exit}" != "2" ]; then
            echo "::error::Grype exited with code ${grype_exit}"
            exit "${grype_exit}"
          fi

          if [ "${NO_BLOCK_AUDIT_FAIL}" = "true" ]; then
            echo "::warning::Grype found vulnerabilities at or above the" \
              "'${GRYPE_FAIL_ON}' threshold, but failures are permitted" \
              "so the job will not fail."
            exit 0
          fi
          echo "::error::Grype found vulnerabilities at or above the" \
            "'${GRYPE_FAIL_ON}' severity threshold. See the table above" \
            "for the offending packages and CVEs."
          exit 1

      - name: 'Upload Grype scan results'
        # yamllint disable-line rule:line-length
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: grype-scan-results
          path: |
            grype-results.sarif
            grype-results.json
            grype-results.txt
          retention-days: 90
          if-no-files-found: warn

      - name: 'Grype summary'
        if: always()
        shell: bash
        run: |
          # Render a Markdown summary of the Grype findings
          {
            echo "## Grype Vulnerability Scan"
            echo ""
            if [ ! -f grype-results.json ]; then
              echo "No scan results available"
              exit 0
            fi
            match_count=$(jq '.matches | length' grype-results.json)
            if [ "${match_count}" = "0" ]; then
              echo "No vulnerabilities found at or above the configured" \
                "severity threshold."
              exit 0
            fi
            echo "Found ${match_count} matching Grype record(s)."
          } >> "$GITHUB_STEP_SUMMARY"
