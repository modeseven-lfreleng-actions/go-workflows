---
# SPDX-License-Identifier: Apache-2.0
# SPDX-FileCopyrightText: 2025 The Linux Foundation

# Exercises the reusable Go workflows in this repository against
# downstream fixture repositories, in parallel, to prove the pipeline
# (job graph, harden-runner wiring, dual checkout, Go build/test/audit
# actions, SBOM/Grype chain) functions end-to-end.
#
# The reusable workflows are referenced by LOCAL path so this always
# validates the current branch's workflows.
#
# The build-test-release workflow is NOT self-tested here: it requires
# a signed semver tag-push context (and creates/promotes GitHub
# releases), which is neither available nor safe on a pull request.
# Instantiating repos validate it through their own release cycles.
name: 'Testing 🧪'

# yamllint disable-line rule:truthy
on:
  workflow_dispatch:
  pull_request:
    types: [opened, reopened, synchronize]
    branches:
      - main
      - master

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

permissions: {}

jobs:
  # Fixture repositories fanned out in parallel via a matrix; each leg
  # pins a known ref so results stay reproducible.
  build-test:
    name: 'Build/Test (${{ matrix.name }})'
    strategy:
      fail-fast: false
      matrix:
        include:
          # TODO(pin-bump): bump to merged SHA of test-go-project#54
          # (restores calculator package)
          - name: 'test-go-project'
            repository: 'lfreleng-actions/test-go-project'
            ref: 'a77c5ec773edc266ddcc3c1d1c306e7bb3f12c30'
            path_prefix: '.'
            build_target: './...'
            go_version_matrix: ''
            # Calculator package missing at this pin; tests soft-fail
            test_permit_fail: true
            audit_permit_fail: false
            grype_permit_fail: false
            gosec: false
            staticcheck: false
            lint_permit_fail: false
          # go.mod declares Go 1.16 (too old to detect a matrix from),
          # so the leg pins the matrix to Go 1.25.
          - name: 'multicloud-k8s'
            repository: 'onap/multicloud-k8s'
            ref: '5c3b1a96811024e65b0977305b6d6737a6e2d453'
            path_prefix: 'src/k8splugin'
            # The tree carries Go plugin sources (package main without
            # func main) that break a plain ./... build; compile the
            # CLI entry point and libraries instead. Multiple packages
            # make go build discard outputs, avoiding a name collision
            # between the cmd binary and the cmd directory.
            build_target: './cmd ./internal/...'
            go_version_matrix: '["1.25"]'
            # Env-dependent test failure in internal/app at this pin
            test_permit_fail: true
            # gosec 38 / staticcheck 18 findings at this pin
            audit_permit_fail: true
            # The 2021-era dependency tree carries medium+ CVEs
            grype_permit_fail: true
            gosec: true
            staticcheck: true
            lint_permit_fail: true
    permissions:
      contents: read
      pull-requests: read  # repository-metadata-action queries PR data
    uses: ./.github/workflows/build-test.yaml
    with:
      repository: ${{ matrix.repository }}
      ref: ${{ matrix.ref }}
      path_prefix: ${{ matrix.path_prefix }}
      build_target: ${{ matrix.build_target }}
      go_version_matrix: ${{ matrix.go_version_matrix }}
      test_permit_fail: ${{ matrix.test_permit_fail }}
      audit_permit_fail: ${{ matrix.audit_permit_fail }}
      grype_permit_fail: ${{ matrix.grype_permit_fail }}
      gosec: ${{ matrix.gosec }}
      staticcheck: ${{ matrix.staticcheck }}
      lint_permit_fail: ${{ matrix.lint_permit_fail }}
